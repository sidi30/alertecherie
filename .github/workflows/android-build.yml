name: Android Build (CI Linux) → APK / Play

# Builds the Android app LOCALLY on a GitHub-hosted Linux runner via
# `eas build --local`. Consumes GitHub Actions minutes — NOT the EAS cloud
# build quota — so it works even when the free EAS allotment is exhausted.
# Account, projectId, keystore and OTA channels stay EAS-managed.
#
# Manual trigger (Actions tab -> Run workflow). Two modes (input `profile`):
#   - preview     -> installable test .apk (sideload on any device). Default.
#   - production  -> store .aab. Set `submit: true` to push to Google Play.
#
# Required secret: EXPO_TOKEN
# Required ONLY for prod submit: PLAY_SERVICE_ACCOUNT_JSON (full Play SA JSON).

on:
  workflow_dispatch:
    inputs:
      profile:
        description: "EAS build profile"
        type: choice
        default: preview
        options:
          - preview
          - production
      submit:
        description: "Submit to Google Play (production profile only)"
        type: boolean
        default: false

concurrency:
  group: android-build-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    # Cold Gradle compile of a managed Expo app on a 2-core runner is slow and
    # has no cache on first run (no android/ at checkout). 150 min = headroom.
    timeout-minutes: 150
    steps:
      - uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          # No `cache: gradle` — managed Expo app has no android/*.gradle at
          # checkout (prebuild generates it during the build).

      # New-Arch Gradle build OOMs the daemon's Metaspace with template default.
      # Disable the long-lived daemon; lift Metaspace via _JAVA_OPTIONS below.
      - name: Tune Gradle for CI
        run: |
          mkdir -p ~/.gradle
          {
            echo "org.gradle.daemon=false"
            echo "org.gradle.parallel=true"
          } >> ~/.gradle/gradle.properties

      # Cache the Gradle dependency dir directly (setup-java's cache can't engage
      # here). Keyed on the lockfile.
      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}
          packager: npm

      - name: Install deps
        run: npm ci

      - name: Resolve artifact path
        id: art
        run: |
          if [ "${{ inputs.profile }}" = "production" ]; then
            echo "ext=aab" >> "$GITHUB_OUTPUT"
          else
            echo "ext=apk" >> "$GITHUB_OUTPUT"
          fi

      - name: Show remote Android version (info)
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: eas build:version:get --platform android --non-interactive || true

      # Local build. preview -> .apk; production -> .aab. Versioning resolved on
      # EAS servers (appVersionSource:remote + autoIncrement); --local only moves
      # the compile step to this runner.
      - name: Build locally (no EAS cloud quota)
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          _JAVA_OPTIONS: "-XX:MaxMetaspaceSize=2g"
        run: |
          eas build \
            --platform android \
            --profile ${{ inputs.profile }} \
            --local \
            --non-interactive \
            --output "$GITHUB_WORKSPACE/app.${{ steps.art.outputs.ext }}"

      - name: Upload artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-${{ inputs.profile }}-${{ steps.art.outputs.ext }}
          path: ${{ github.workspace }}/app.${{ steps.art.outputs.ext }}
          if-no-files-found: warn
          retention-days: 7

      - name: Write Play service account
        if: ${{ inputs.profile == 'production' && inputs.submit }}
        env:
          PLAY_SA: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
        run: |
          if [ -z "$PLAY_SA" ]; then
            echo "::error::PLAY_SERVICE_ACCOUNT_JSON secret is empty — cannot submit to Play."
            exit 1
          fi
          printf '%s' "$PLAY_SA" > play-service-account.json

      - name: Submit to Google Play
        if: ${{ inputs.profile == 'production' && inputs.submit }}
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          eas submit \
            --platform android \
            --profile production \
            --path "$GITHUB_WORKSPACE/app.aab" \
            --non-interactive

      - name: Cleanup credentials
        if: always()
        run: rm -f play-service-account.json

      - name: Summary
        if: success()
        run: |
          echo "## Android build" >> "$GITHUB_STEP_SUMMARY"
          echo "- Built locally on \`ubuntu-latest\` (no EAS cloud quota used)." >> "$GITHUB_STEP_SUMMARY"
          echo "- Profile: \`${{ inputs.profile }}\` -> \`app.${{ steps.art.outputs.ext }}\`." >> "$GITHUB_STEP_SUMMARY"
          echo "- Submitted to Google Play: \`${{ inputs.profile == 'production' && inputs.submit }}\`." >> "$GITHUB_STEP_SUMMARY"
          if [ "${{ inputs.profile }}" = "preview" ]; then
            echo "Download the .apk artifact and sideload it on any Android device to test." >> "$GITHUB_STEP_SUMMARY"
          fi
